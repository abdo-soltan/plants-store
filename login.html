<body>
    <div class="wrapper">
    <form>
        <h1>login</h1>

            <i class='bx bxs-lock-alt' ></i>
        </div>


        <div class="forget_password_and_remember_me">
            <label> <input type="checkbox"> Remember Me</label>
            <a href="">Forget-password</a>

        <button type="submit" class="btn">login</button>
          
            
            <p class="register-link">Don't have an account <a href="resgister.html">Register</a></p>

    </form>
    </div>
